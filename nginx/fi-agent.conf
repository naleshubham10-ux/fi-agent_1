# ─────────────────────────────────────────────────────────────────────────────
#  ABC Bank FI Agent — nginx config for dev.videocx.io
#
#  PREREQUISITE: Add inside http {} in /etc/nginx/nginx.conf (once only):
#
#      map $http_upgrade $connection_upgrade {
#          default  upgrade;
#          ''       close;
#      }
#
#  INSTALL:
#      sudo cp fi-agent.conf /etc/nginx/sites-available/fi-agent
#      sudo ln -s /etc/nginx/sites-available/fi-agent /etc/nginx/sites-enabled/fi-agent
#      sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen      80;
    listen      [::]:80;
    server_name dev.videocx.io;
    return 301  https://$host$request_uri;
}

# Main HTTPS server
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    server_name dev.videocx.io;

    # SSL — Let's Encrypt (run: sudo certbot --nginx -d dev.videocx.io)
    ssl_certificate     /etc/letsencrypt/live/dev.videocx.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.videocx.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── WebSocket: wss://dev.videocx.io/fi/ws/... ─────────────────────────
    # MUST come before the generic /fi/ block
    location /fi/ws/ {
        proxy_pass          http://127.0.0.1:8000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection $connection_upgrade;
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── All FI Agent traffic: https://dev.videocx.io/fi/... ───────────────
    location /fi/ {
        proxy_pass          http://127.0.0.1:8000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        client_max_body_size 600m;
        proxy_read_timeout   300s;
        proxy_send_timeout   300s;
        proxy_buffering      off;
    }

    access_log /var/log/nginx/fi-agent-access.log;
    error_log  /var/log/nginx/fi-agent-error.log warn;
}
